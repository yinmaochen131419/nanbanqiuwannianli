<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南半球历法 | Southern Hemisphere Calendar</title>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>
<style>
:root {
  --sky-blue: #1565C0;
  --sky-light: #E3F2FD;
  --navy: #0D47A1;
  --gold: #F9A825;
  --card-bg: #FFFFFF;
  --text-dark: #212121;
  --text-mid: #424242;
  --text-light: #757575;
  --north-bg: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);
  --south-bg: linear-gradient(135deg, #FCE4EC 0%, #F8BBD0 100%);
  --radius: 16px;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'Noto Sans SC', 'Noto Sans TC', 'Segoe UI', sans-serif;
  background: #F5F5F5;
  color: var(--text-dark);
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--sky-blue) 0%, var(--navy) 100%);
  color: white;
  padding: 20px 16px 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '☯';
  position: absolute;
  right: -20px;
  top: -20px;
  font-size: 120px;
  opacity: 0.08;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.header .subtitle {
  font-size: 13px;
  opacity: 0.85;
}

/* Language Switcher */
.lang-bar {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 12px 16px;
  background: white;
  border-bottom: 1px solid #E0E0E0;
}
.lang-btn {
  padding: 6px 14px;
  border: 1.5px solid var(--sky-blue);
  border-radius: 20px;
  background: white;
  color: var(--sky-blue);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.lang-btn.active {
  background: var(--sky-blue);
  color: white;
}
.lang-btn:hover { opacity: 0.85; }

/* Date Picker */
.date-picker-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 16px;
  background: white;
}
.date-picker-bar input[type="date"] {
  padding: 8px 14px;
  border: 1.5px solid #BBDEFB;
  border-radius: 10px;
  font-size: 15px;
  color: var(--sky-blue);
  outline: none;
}
.date-picker-bar input[type="date"]:focus {
  border-color: var(--sky-blue);
  box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
}
.today-btn {
  padding: 8px 16px;
  background: var(--sky-blue);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.today-btn:hover { background: var(--navy); }

/* Tai Chi Divider */
.taichi-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 0 8px;
  gap: 12px;
}
.taichi-divider .line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--sky-blue), transparent);
}
.taichi-symbol {
  font-size: 28px;
  animation: spin 20s linear infinite;
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Dual Cards Container */
.dual-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 12px 12px;
  max-width: 800px;
  margin: 0 auto;
}
@media (max-width: 600px) {
  .dual-cards { grid-template-columns: 1fr; }
}

/* Card Base */
.card {
  border-radius: var(--radius);
  padding: 18px 16px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.card-north {
  background: var(--north-bg);
  color: var(--text-dark);
}
.card-south {
  background: var(--south-bg);
  color: #4E342E;
}
.card-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-north .card-label { color: var(--sky-blue); }
.card-south .card-label { color: #C2185B; }
.card-label .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.card-north .dot { background: var(--sky-blue); }
.card-south .dot { background: #C2185B; }

/* Solar Date */
.solar-date {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}
.card-south .solar-date { color: #5D4037; }

/* Lunar Date */
.lunar-date {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 12px;
  padding: 6px 10px;
  border-radius: 8px;
  display: inline-block;
}
.card-north .lunar-date { background: rgba(21,101,192,0.1); color: var(--sky-blue); }
.card-south .lunar-date { background: rgba(194,24,91,0.1); color: #C2185B; }

/* Info Rows */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  font-size: 14px;
}
.card-south .info-row { border-bottom-color: rgba(194,24,91,0.12); }
.info-row:last-child { border-bottom: none; }
.info-label { opacity: 0.7; font-size: 13px; }
.info-value { font-weight: 600; }
.card-south .info-value { color: #C2185B; }

/* Moon Phase */
.moon-phase {
  text-align: center;
  padding: 12px 0 4px;
}

/* Four Pillars Vertical */
.pillars-section {
  padding: 0 12px 12px;
  max-width: 800px;
  margin: 0 auto;
}
.pillars-card {
  background: white;
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
}
.pillars-card h3 {
  font-size: 14px;
  color: var(--text-mid);
  margin-bottom: 10px;
  text-align: center;
}
.pillars-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #F5F5F5;
}
.pillars-row:last-child { border-bottom: none; }
.pillars-row-label {
  width: 50px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  text-align: center;
  flex-shrink: 0;
}
.pillars-row-north {
  flex: 1;
  text-align: center;
  font-family: 'Noto Serif SC', 'SimSun', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--sky-blue);
  background: var(--sky-light);
  border-radius: 8px;
  padding: 6px 0;
  margin: 0 4px;
}
.pillars-row-south {
  flex: 1;
  text-align: center;
  font-family: 'Noto Serif SC', 'SimSun', serif;
  font-size: 22px;
  font-weight: 700;
  color: #C2185B;
  background: #FCE4EC;
  border-radius: 8px;
  padding: 6px 0;
  margin: 0 4px;
}

/* Unified Comparison Table */
.compare-section {
  grid-column: 1 / -1;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}
.compare-card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.compare-header {
  display: flex;
  background: #FAFAFA;
  border-bottom: 1px solid #E0E0E0;
}
.compare-header-label {
  width: 60px;
  padding: 10px 0;
  text-align: center;
  font-size: 12px;
  color: var(--text-light);
  flex-shrink: 0;
}
.compare-header-north {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--sky-blue);
  background: var(--sky-light);
}
.compare-header-south {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: #C2185B;
  background: #FCE4EC;
}
.compare-row {
  display: flex;
  align-items: center;
  border-bottom: 1px solid #F5F5F5;
}
.compare-row:last-child { border-bottom: none; }
.compare-row-label {
  width: 60px;
  padding: 8px 0;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-light);
  flex-shrink: 0;
}
.compare-row-north {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: var(--sky-blue);
  background: rgba(227,242,253,0.3);
  margin: 2px 2px;
  border-radius: 6px;
}
.compare-row-south {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: #C2185B;
  background: rgba(252,228,236,0.3);
  margin: 2px 2px;
  border-radius: 6px;
}
.compare-row-north.ganzhi {
  font-family: 'Noto Serif SC', 'SimSun', serif;
  font-size: 20px;
  font-weight: 700;
}
.compare-row-south.ganzhi {
  font-family: 'Noto Serif SC', 'SimSun', serif;
  font-size: 20px;
  font-weight: 700;
}
.moon-inline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.moon-inline .moon-emoji-sm { font-size: 22px; }
.moon-inline .moon-name-sm { font-size: 13px; }
.moon-emoji {
  font-size: 40px;
  display: block;
  margin-bottom: 4px;
}
.moon-name {
  font-size: 14px;
  font-weight: 500;
}

/* Solar Term Card */
.solar-term-section {
  padding: 0 12px 12px;
  max-width: 800px;
  margin: 0 auto;
}
.solar-term-card {
  background: white;
  border-radius: var(--radius);
  padding: 18px 16px;
  box-shadow: var(--shadow);
}
.solar-term-card h3 {
  font-size: 15px;
  color: var(--sky-blue);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.solar-term-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.st-item {
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
}
.st-north {
  background: var(--sky-light);
  border-left: 3px solid var(--sky-blue);
}
.st-south {
  background: #E8EAF6;
  border-left: 3px solid var(--navy);
}
.st-item .st-name { font-weight: 600; }
.st-item .st-date { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.st-south .st-name { color: var(--navy); }
.st-north .st-name { color: var(--sky-blue); }


/* Knowledge Cards (Collapsible) */
.knowledge-section {
  padding: 0 12px 20px;
  max-width: 800px;
  margin: 0 auto;
}
.knowledge-section-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--sky-blue);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.k-card {
  background: #E3F2FD;
  border-radius: var(--radius);
  margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  overflow: hidden;
}
.k-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.k-card-header:hover {
  background: rgba(21,101,192,0.08);
}
.k-card-header h4 {
  font-size: 15px;
  font-weight: 700;
  color: var(--sky-blue);
  margin: 0;
}
.k-card-arrow {
  font-size: 14px;
  color: var(--sky-blue);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.k-card.open .k-card-arrow {
  transform: rotate(90deg);
}
.k-card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.k-card.open .k-card-body {
  max-height: 2000px;
}
.k-card-content {
  padding: 0 16px 16px;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-mid);
  white-space: pre-line;
}

/* Lite Notice */
.lite-notice-section {
  padding: 0 12px 16px;
  max-width: 800px;
  margin: 0 auto;
}
.lite-notice-card {
  background: linear-gradient(135deg, #E8EAF6 0%, #C5CAE9 100%);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  border: 1px solid #9FA8DA;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.lite-notice-icon {
  font-size: 24px;
  flex-shrink: 0;
  margin-top: 2px;
}
.lite-notice-card p {
  font-size: 13px;
  line-height: 1.7;
  color: #283593;
  margin: 0;
}
/* Footer */
.footer {
  text-align: center;
  padding: 20px 16px 30px;
  color: var(--text-light);
  font-size: 12px;
}
.footer a {
  color: var(--sky-blue);
  text-decoration: none;
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-light);
}
</style>
</head>
<body>

<div class="header">
  <h1 id="headerTitle">南半球历法</h1>
  <div class="subtitle" id="headerSubtitle">太极生两仪 · 南北半球历法对照</div>
</div>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('zh')">简体中文</button>
  <button class="lang-btn" onclick="setLang('tw')">繁體中文</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('es')">Español</button>
</div>

<div class="date-picker-bar">
  <input type="date" id="dateInput" />
  <button class="today-btn" id="todayBtn" onclick="goToday()">今天</button>
</div>

<div class="taichi-divider">
  <div class="line"></div>
  <div class="taichi-symbol">☯</div>
  <div class="line"></div>
</div>

<div class="dual-cards" id="dualCards">
  <div class="loading" id="loadingMsg">加载中...</div>
</div>

<div class="solar-term-section" id="solarTermSection"></div>

<div class="knowledge-section" id="knowledgeSection">
  <div class="knowledge-section-title" id="knowledgeSectionTitle">📚 历法知识</div>
  <div class="k-card" id="kCard1">
    <div class="k-card-header" onclick="toggleKCard('kCard1')">
      <h4 id="k1Title"></h4>
      <span class="k-card-arrow">▶</span>
    </div>
    <div class="k-card-body"><div class="k-card-content" id="k1Content"></div></div>
  </div>
  <div class="k-card" id="kCard2">
    <div class="k-card-header" onclick="toggleKCard('kCard2')">
      <h4 id="k2Title"></h4>
      <span class="k-card-arrow">▶</span>
    </div>
    <div class="k-card-body"><div class="k-card-content" id="k2Content"></div></div>
  </div>
  <div class="k-card" id="kCard3">
    <div class="k-card-header" onclick="toggleKCard('kCard3')">
      <h4 id="k3Title"></h4>
      <span class="k-card-arrow">▶</span>
    </div>
    <div class="k-card-body"><div class="k-card-content" id="k3Content"></div></div>
  </div>
  <div class="k-card" id="kCard4">
    <div class="k-card-header" onclick="toggleKCard('kCard4')">
      <h4 id="k4Title"></h4>
      <span class="k-card-arrow">▶</span>
    </div>
    <div class="k-card-body"><div class="k-card-content" id="k4Content"></div></div>
  </div>
  <div class="k-card" id="kCard5">
    <div class="k-card-header" onclick="toggleKCard('kCard5')">
      <h4 id="k5Title"></h4>
      <span class="k-card-arrow">▶</span>
    </div>
    <div class="k-card-body"><div class="k-card-content" id="k5Content"></div></div>
  </div>
</div>

<div class="lite-notice-section">
  <div class="lite-notice-card">
    <span class="lite-notice-icon">📱</span>
    <p id="liteNoticeText"></p>
  </div>
</div>

<div class="footer">
  <p id="footerText">南半球历法 · 太极对称历法体系</p>
  <p style="margin-top:6px"><a href="https://github.com" id="footerLink">GitHub</a> · <a href="https://gitee.com" id="footerLink2">Gitee</a></p>
</div>

<script>
// ==================== I18N ====================
const I18N = {
  zh: {
    headerTitle: '南半球历法',
    headerSubtitle: '太极生两仪 · 南北半球历法对照',
    today: '今天',
    northHemisphere: '北半球',
    southHemisphere: '南半球',
    solarDate: '公历',
    lunarDate: '农历',
    solarTerm: '节气',
    moonPhase: '月相',
    zodiac: '生肖',
    fourPillars: '四柱八字',
    yearPillar: '年柱',
    monthPillar: '月柱',
    dayPillar: '日柱',
    northCity: '中国·上海 北纬31.2° 东经121.5° UTC+8',
    southCity: '阿根廷·布宜诺斯艾利斯 南纬31.2° 西经58.5° UTC-4',
    year: '年',
    month: '月',
    day: '日',
    nextTerm: '下一节气',
    prevTerm: '上一节气',
    liteNotice: '此为极简体验版，仅展示核心对照功能。下载安装「南半球万年历」App 获取完整功能：日程管理、值日星宿、月躔星宿、历法知识、多城市时区等。',
    k1Title: '一、南北半球历法换算原理',
    k1Content: '北半球与南半球的季节完全相反，当北半球是夏季时，南半球是冬季。\n\n【阳历换算】南半球月份 = 北半球月份 + 6（超过12则减12），年份根据是否跨年调整。\n例：北半球2026年1月 → 南半球2025年7月；北半球2026年7月 → 南半球2026年1月。\n\n【农历换算】南半球农历月份 = 北半球农历月份 + 6（超过12则减12），闰月同步偏移。\n\n【太极对立日】南半球农历日 = 北半球农历日 + 15（超过当月天数则减当月天数，月份进位）。\n例：北半球农历四月十八 → 南半球农历十月初三。\n\n太极对立日的本质：农历日+15意味着在朔望月圆上相隔180°，月相形态恰好翻转。',
    k2Title: '二、月相翻转 · 太极验证',
    k2Content: '月相是连接南北半球历法的天然验证工具。\n月相由月球绕地球公转产生，全球同一时刻月相相同，但南北半球看到的亮面朝向呈镜像对称。\n\n【月相对照】\n北半球：新月 → D形蛾眉月 → 上弦月（右半亮）→ 盈凸月 → 满月\n南半球：新月 → 反D形蛾眉月 → 上弦月（左半亮）→ 盈凸月 → 满月\n\n满月在全球各地一样圆，但渐圆的方向相反：中国的月亮D形渐圆，阿根廷的反D形渐圆，殊途同归，一样圆。\n\n【统一与对立】\n· 统一：月相日数全球一致，满月全球同圆\n· 对立：亮面朝向镜像对称，渐圆方向相反\n· 太极：朔望圆上相隔180°，正是太极双鱼图的旋转对称',
    k3Title: '三、南半球节气对应关系',

let currentLang = 'zh';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  updateUI();
}

function t(key) { return I18N[currentLang][key] || I18N['zh'][key]; }

// ==================== CALENDAR ENGINE ====================

// Moon phase emoji (Northern Hemisphere)
const MOON_EMOJIS = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];

function getMoonPhaseIndex(lunarDay) {
  // Approximate moon phase from lunar day (1-30)
  if (lunarDay === 1 || lunarDay === 30) return 0; // New moon
  if (lunarDay >= 2 && lunarDay <= 6) return 1;    // Waxing crescent
  if (lunarDay >= 7 && lunarDay <= 8) return 2;    // First quarter
  if (lunarDay >= 9 && lunarDay <= 13) return 3;   // Waxing gibbous
  if (lunarDay >= 14 && lunarDay <= 16) return 4;  // Full moon
  if (lunarDay >= 17 && lunarDay <= 21) return 5;  // Waning gibbous
  if (lunarDay >= 22 && lunarDay <= 23) return 6;  // Last quarter
  return 7; // Waning crescent
}

function getSouthMoonEmoji(phaseIndex) {
  return MOON_EMOJIS[(8 - phaseIndex) % 8];
}

function computeSouthLunar(northLunarYear, northLunarMonth, northLunarDay, isNorthLeap) {
  // Southern hemisphere lunar month = north month + 6 (with year boundary)
  let southYear, southMonth;
  if (northLunarMonth >= 7) {
    southYear = northLunarYear;
    southMonth = northLunarMonth - 6;
  } else {
    southYear = northLunarYear - 1;
    southMonth = northLunarMonth + 6;
  }

  // Southern hemisphere leap month = (north leap month + 6) % 12
  // For simplicity in demo, we check if current month is leap
  let southIsLeap = false;
  // The south leap month calculation
  try {
    const northLeapMonth = getNorthLeapMonth(northLunarYear);
    let southLeapMonth = 0;
    if (northLeapMonth > 0) {
      southLeapMonth = (northLeapMonth + 6) % 12;
      if (southLeapMonth === 0) southLeapMonth = 12;
    }
    southIsLeap = (southLeapMonth === southMonth && isNorthLeap);
  } catch(e) {}

  // Tai Chi opposing day: lunar day + 15 with rollover
  let oppositeDay = ((northLunarDay - 1 + 15) % 30) + 1;

  return { southYear, southMonth, oppositeDay, southIsLeap };
}

function getNorthLeapMonth(lunarYear) {
  // Use lunar-javascript to find leap month
  for (let m = 1; m <= 12; m++) {
    try {
      const testLunar = Lunar.fromYmd(lunarYear, -m, 1);
      if (testLunar) return m;
    } catch(e) {}
  }
  return 0;
}

function computeSouthSolar(year, month) {
  // Southern hemisphere solar: month + 6, year boundary at month 7
  let southYear, southMonth;
  if (month >= 7) {
    southYear = year;
    southMonth = month - 6;
  } else {
    southYear = year - 1;
    southMonth = month + 6;
  }
  return { southYear, southMonth };
}

// ==================== SOLAR TERMS ====================

// Heavenly Stems and Earthly Branches for South Hemisphere 四柱
const TIAN_GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DI_ZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

// South hemisphere 四柱 = North 四柱 each shifted by +6 (Tai Chi symmetry)
function shiftGanZhi(ganZhi) {
  // e.g. "丙午" → stem 丙(2)+6=壬(8), branch 午(6)+6=子(0) → "壬子"
  const ganIdx = TIAN_GAN.indexOf(ganZhi[0]);
  const zhiIdx = DI_ZHI.indexOf(ganZhi[1]);
  return TIAN_GAN[(ganIdx + 6) % 10] + DI_ZHI[(zhiIdx + 6) % 12];
}

function buildPillarsHtml(yearGZ, monthGZ, dayGZ, side) {
  const labelColor = side === 'north' ? 'var(--sky-blue)' : '#C2185B';
  return `
    <div class="pillars-container">
      <div class="pillar-item">
        <span class="pillar-label" style="color:${labelColor}">${t('yearPillar')}</span>
        <span class="pillar-gan">${yearGZ[0]}</span>
        <span class="pillar-zhi">${yearGZ[1]}</span>
      </div>
      <div class="pillar-item">
        <span class="pillar-label" style="color:${labelColor}">${t('monthPillar')}</span>
        <span class="pillar-gan">${monthGZ[0]}</span>
        <span class="pillar-zhi">${monthGZ[1]}</span>
      </div>
      <div class="pillar-item">
        <span class="pillar-label" style="color:${labelColor}">${t('dayPillar')}</span>
        <span class="pillar-gan">${dayGZ[0]}</span>
        <span class="pillar-zhi">${dayGZ[1]}</span>
      </div>
    </div>
  `;
}

function getCurrentAndNextSolarTerm(solar) {
  // lunar-javascript: JieQi is on Lunar object, not Solar
  // lunar.getJieQi() returns current day's jieqi name (empty string if none)
  const lunar = solar.getLunar();
  const currentName = lunar.getJieQi();
  let current = null, next = null, prev = null;

  if (currentName) {
    current = { name: currentName, date: formatSolarDateObj(solar) };
  }

  // Find next solar term by scanning forward
  for (let i = 1; i <= 31; i++) {
    const nextSolar = Solar.fromYmd(solar.getYear(), solar.getMonth(), solar.getDay() + i);
    const jq = nextSolar.getLunar().getJieQi();
    if (jq) {
      next = { name: jq, date: formatSolarDateObj(nextSolar) };
      break;
    }
  }

  // Find prev solar term by scanning backward
  for (let i = 1; i <= 31; i++) {
    const prevSolar = Solar.fromYmd(solar.getYear(), solar.getMonth(), solar.getDay() - i);
    const jq = prevSolar.getLunar().getJieQi();
    if (jq) {
      prev = { name: jq, date: formatSolarDateObj(prevSolar) };
      break;
    }
  }

  return { current, next, prev };
}

function formatSolarDateObj(solar) {
  return `${solar.getYear()}.${String(solar.getMonth()).padStart(2,'0')}.${String(solar.getDay()).padStart(2,'0')}`;
}

function getSolarTermIndex(name) {
  const allTerms = I18N.zh.solarTerms;
  return allTerms.indexOf(name);
}

// Find the actual date of the opposite (southern hemisphere) solar term
// by searching for when that term occurs in the calendar
function findOppositeSolarTermDate(solar, southTermIdx) {
  const southTermName = I18N.zh.solarTerms[southTermIdx];
  // Search forward and backward from current date to find this term
  // The opposite term is ~6 months away, so search ±200 days
  for (let offset = -200; offset <= 200; offset++) {
    if (offset === 0) continue;
    try {
      const testSolar = Solar.fromYmd(solar.getYear(), solar.getMonth(), solar.getDay() + offset);
      const jq = testSolar.getLunar().getJieQi();
      if (jq === southTermName) {
        return formatSolarDateObj(testSolar);
      }
    } catch(e) { continue; }
  }
  return '';
}

// Find opposite solar term date given the north term name
function findOppositeSolarTermDateByName(northTermName, southTermIdx) {
  const southTermName = I18N.zh.solarTerms[southTermIdx];
  // Find the north term date first, then search around that area
  const northIdx = I18N.zh.solarTerms.indexOf(northTermName);
  // The south opposite term is ~6 months after/before the north term
  // Search forward from north term date
  const now = new Date();
  const solar = Solar.fromYmd(now.getFullYear(), now.getMonth() + 1, now.getDate());
  for (let offset = -200; offset <= 400; offset++) {
    try {
      const testSolar = Solar.fromYmd(solar.getYear(), solar.getMonth(), solar.getDay() + offset);
      const jq = testSolar.getLunar().getJieQi();
      if (jq === southTermName) {
        return formatSolarDateObj(testSolar);
      }
    } catch(e) { continue; }
  }
  return '';
}

// ==================== RENDER ====================

function formatDate(solar) {
  const y = solar.getYear();
  const m = solar.getMonth();
  const d = solar.getDay();
  if (currentLang === 'zh' || currentLang === 'tw') {
    return `${y}${t('year')}${m}${t('month')}${d}${t('day')}`;
  } else if (currentLang === 'en') {
    return `${t('gregorianMonths')[m-1]} ${d}, ${y}`;
  } else {
    return `${d} de ${t('gregorianMonths')[m-1]} de ${y}`;
  }
}

function formatLunarDate(prefix, month, day, isLeap) {
  const leapStr = isLeap ? t('leapPrefix') : '';
  const monthName = t('lunarMonths')[month - 1];
  const dayName = t('lunarDays')[day - 1];
  if (currentLang === 'zh' || currentLang === 'tw') {
    return `${leapStr}${prefix}${monthName}${dayName}`;
  } else {
    return `${prefix} ${leapStr}${monthName} ${dayName}`;
  }
}

function formatSouthLunarDate(prefix, month, oppositeDay, isLeap) {
  const leapStr = isLeap ? t('leapPrefix') : '';
  const monthName = t('lunarMonths')[month - 1];
  const dayName = t('lunarDays')[oppositeDay - 1];
  if (currentLang === 'zh' || currentLang === 'tw') {
    return `${leapStr}${prefix}${monthName}${dayName}`;
  } else {
    return `${prefix} ${leapStr}${monthName} ${dayName}`;
  }
}

  if (!dateStr) return;

  // North hemisphere data

  const northLunarMonth = Math.abs(lunar.getMonth());
  const northLunarDay = lunar.getDay();
  const isNorthLeap = lunar.getMonth() < 0;
  const ganZhiYear = lunar.getYearInGanZhi();
  const ganZhiMonth = lunar.getMonthInGanZhi();
  const ganZhiDay = lunar.getDayInGanZhi();

  // South hemisphere data
  const south = computeSouthLunar(northLunarYear, northLunarMonth, northLunarDay, isNorthLeap);
  const southSolar = computeSouthSolar(y, m);
  // South 四柱: all three pillars shifted by +6 from North
  const southGanZhiYear = shiftGanZhi(ganZhiYear);
  const southGanZhiMonth = shiftGanZhi(ganZhiMonth);
  const southGanZhiDay = shiftGanZhi(ganZhiDay);
  // Zodiac derived from year pillar's Earthly Branch (not year number)

  const southZodiacIndex = DI_ZHI.indexOf(southGanZhiYear[1]);

  const southZodiacName = t('zodiacs')[southZodiacIndex];

  const southLunarStr = formatSouthLunarDate(t('southPrefix'), south.southMonth, south.oppositeDay, south.southIsLeap);

  const northSolarStr = formatDate(solar);

    ? `${southSolar.southYear}${t('year')}${southSolar.southMonth}${t('month')}${d}${t('day')}`

      ? `${t('gregorianMonths')[southSolar.southMonth-1]} ${d}, ${southSolar.southYear}`
      : `${d} de ${t('gregorianMonths')[southSolar.southMonth-1]} de ${southSolar.southYear}`;

  const northMoonEmoji = MOON_EMOJIS[moonPhaseIdx];

  const southMoonName = t('southMoonPhases')[moonPhaseIdx];

  let southTermDisplay = '—';

  let southTermDate = '';

  let nextNorthTermDate = '';
  let nextSouthTermName = '';
  let nextSouthTermDate = '';

  if (terms.current) {
    const idx = getSolarTermIndex(terms.current.name);
    if (idx >= 0) {
      northTermDisplay = t('solarTerms')[idx];
      northTermDate = formatSolarDateObj(solar);
      const southIdx = (idx + 12) % 24;
      southTermDisplay = t('solarTerms')[southIdx];
      southTermDate = findOppositeSolarTermDate(solar, southIdx);
    }
  }
  if (terms.next) {
    const idx = getSolarTermIndex(terms.next.name);
    if (idx >= 0) {
      nextNorthTermName = t('solarTerms')[idx];
      nextNorthTermDate = terms.next.date;
      const southIdx = (idx + 12) % 24;
      nextSouthTermName = t('solarTerms')[southIdx];
      nextSouthTermDate = findOppositeSolarTermDateByName(terms.next.name, southIdx);
    }
  }

  // Comparison table (without solar terms - those go in separate card)
  const compareHtml = `
    <div class="compare-section">
      <div class="compare-card">
        <div class="compare-header">
          <div class="compare-header-label"></div>
          <div class="compare-header-north">${t('northHemisphere')}<br><span style="font-size:10px;font-weight:400;opacity:0.7">${t('northCity')}</span></div>

  // Knowledge section title
  const sectionTitles = { zh: '📚 历法知识', tw: '📚 曆法知識', en: '📚 Calendar Knowledge', es: '📚 Conocimiento Calendario' };
  document.getElementById('knowledgeSectionTitle').textContent = sectionTitles[currentLang] || sectionTitles.zh;

  document.getElementById('liteNoticeText').textContent = t('liteNotice');

}

function goToday() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  document.getElementById('dateInput').value = `${y}-${m}-${d}`;
  updateUI();
}
